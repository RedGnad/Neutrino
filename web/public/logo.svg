<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#080705"/>
  <rect x="1" y="1" width="30" height="30" rx="5" fill="none" stroke="#C8A86E" stroke-opacity="0.2" stroke-width="1.2"/>
  <!-- Thin left stem -->
  <line x1="9" y1="8" x2="9" y2="24" stroke="#907E6C" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Calligraphic diagonal — the dominant stroke, warm amber -->
  <polygon points="9,8 13,8 23,24 19,24" fill="#C8A86E"/>
  <!-- Thin right stem -->
  <line x1="23" y1="8" x2="23" y2="24" stroke="#907E6C" stroke-width="1.4" stroke-linecap="round"/>
</svg>
